<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <rect width="32" height="32" rx="7" fill="#1095C1"/>
  <!-- ears -->
  <ellipse cx="9" cy="7.5" rx="3.5" ry="4" transform="rotate(-15 9 7.5)" fill="#E8829A"/>
  <ellipse cx="23" cy="7.5" rx="3.5" ry="4" transform="rotate(15 23 7.5)" fill="#E8829A"/>
  <!-- inner ears -->
  <ellipse cx="9" cy="7.5" rx="2" ry="2.3" transform="rotate(-15 9 7.5)" fill="#D4607C"/>
  <ellipse cx="23" cy="7.5" rx="2" ry="2.3" transform="rotate(15 23 7.5)" fill="#D4607C"/>
  <!-- head -->
  <circle cx="16" cy="17" r="9.5" fill="#F4B4C4"/>
  <!-- snout -->
  <ellipse cx="16" cy="20.5" rx="5" ry="3.5" fill="#E8829A"/>
  <!-- nostrils -->
  <ellipse cx="13.8" cy="20.5" rx="1.4" ry="1.1" fill="#D4607C"/>
  <ellipse cx="18.2" cy="20.5" rx="1.4" ry="1.1" fill="#D4607C"/>
  <!-- eyes -->
  <circle cx="12" cy="14.5" r="2" fill="#2A2A2A"/>
  <circle cx="20" cy="14.5" r="2" fill="#2A2A2A"/>
  <circle cx="12.6" cy="13.9" r="0.7" fill="#fff"/>
  <circle cx="20.6" cy="13.9" r="0.7" fill="#fff"/>
</svg>
