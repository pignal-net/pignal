name: Build Server Bundle

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Prepare wrangler config
        working-directory: server
        run: cp wrangler.toml.example wrangler.toml

      - name: Build Worker bundle
        working-directory: server
        run: npx wrangler deploy --dry-run --outdir dist

      - name: Package bundle
        working-directory: server
        run: |
          mkdir -p dist/migrations
          cp migrations/*.sql dist/migrations/
          mkdir -p dist/seeds
          cp ../templates/seeds/*.sql dist/seeds/
          cd dist
          tar -czf ../bundle.tar.gz --exclude='*.map' --exclude='README.md' .

      - name: Determine release tag
        id: tag
        env:
          REF_NAME: ${{ github.ref_name }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          if [[ "$REF_NAME" == v* ]]; then
            echo "tag=$REF_NAME" >> "$GITHUB_OUTPUT"
            echo "name=$REF_NAME" >> "$GITHUB_OUTPUT"
          else
            echo "tag=build-$COMMIT_SHA" >> "$GITHUB_OUTPUT"
            echo "name=Build $COMMIT_SHA" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.name }}
          files: server/bundle.tar.gz
          generate_release_notes: false
          make_latest: true
