name: Build Server Bundles

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Prepare wrangler config
        working-directory: server
        run: cp wrangler.toml.example wrangler.toml

      - name: Build CSS (shared across all templates)
        run: pnpm css:build

      - name: Build per-template bundles
        run: |
          TEMPLATES=$(jq -r '.[] | select(.status == "shipped") | "\(.index):\(.id)"' templates/templates.json)
          for entry in $TEMPLATES; do
            INDEX=$(echo "$entry" | cut -d: -f1)
            TMPL=$(echo "$entry" | cut -d: -f2)
            IDX=$(printf "%02d" "$INDEX")

            echo "Building template: $TMPL (#$IDX)"
            TEMPLATE="$TMPL" pnpm resolve-template

            cd server
            npx wrangler deploy --dry-run --outdir "dist-$TMPL"

            mkdir -p "dist-$TMPL/migrations"
            cp migrations/*.sql "dist-$TMPL/migrations/"
            if [ -f "../templates/seeds/$TMPL.sql" ]; then
              cp "../templates/seeds/$TMPL.sql" "dist-$TMPL/seed.sql"
            fi

            cd "dist-$TMPL"
            tar -czf "../../pignal-$IDX-$TMPL.tar.gz" --exclude='*.map' --exclude='README.md' .
            cd ../..
          done

          echo "Built $(ls pignal-*.tar.gz | wc -l | tr -d ' ') template bundles"

      - name: Determine release tag
        id: tag
        env:
          REF_NAME: ${{ github.ref_name }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          if [[ "$REF_NAME" == v* ]]; then
            echo "tag=$REF_NAME" >> "$GITHUB_OUTPUT"
            echo "name=$REF_NAME" >> "$GITHUB_OUTPUT"
          else
            echo "tag=build-$COMMIT_SHA" >> "$GITHUB_OUTPUT"
            echo "name=Build $COMMIT_SHA" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.name }}
          files: pignal-*.tar.gz
          generate_release_notes: false
          make_latest: true
