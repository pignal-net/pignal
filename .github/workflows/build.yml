name: Build Server Bundle

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Prepare wrangler config
        working-directory: server
        run: cp wrangler.toml.example wrangler.toml

      - name: Build Worker bundle
        working-directory: server
        run: npx wrangler deploy --dry-run --outdir dist

      - name: Package bundle
        working-directory: server
        run: |
          mkdir -p dist/migrations
          cp migrations/*.sql dist/migrations/
          cd dist
          tar -czf ../bundle.tar.gz --exclude='*.map' --exclude='README.md' .

      - name: Create Release
        env:
          COMMIT_SHA: ${{ github.sha }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.sha }}
          name: Build ${{ github.sha }}
          files: server/bundle.tar.gz
          generate_release_notes: false
          make_latest: true
