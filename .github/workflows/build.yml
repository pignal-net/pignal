name: Build Server Bundle

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build Worker bundle
        run: pnpm --filter @pignal/server exec wrangler deploy --dry-run --outdir server/dist

      - name: Create Release
        env:
          COMMIT_SHA: ${{ github.sha }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.sha }}
          name: Build ${{ github.sha }}
          files: server/dist/index.js
          generate_release_notes: false
          make_latest: true
